version: "3.9"

# Production overrides — use with:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups          # mount for pg_dump cron backups
    ports: []                       # don't expose DB port in production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    ports: []                       # don't expose Redis port in production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    restart: always
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull ${OLLAMA_MODEL:-llama3} && wait"]
    ports: []                       # don't expose Ollama externally

  api:
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      WA_VERIFY_TOKEN: ${WA_VERIFY_TOKEN}
      WA_ACCESS_TOKEN: ${WA_ACCESS_TOKEN}
      WA_PHONE_NUMBER_ID: ${WA_PHONE_NUMBER_ID}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    ports: []                       # put behind a reverse proxy (nginx/caddy)
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  web:
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}   # e.g. https://api.masaar.example.com
    ports: []                       # put behind a reverse proxy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
